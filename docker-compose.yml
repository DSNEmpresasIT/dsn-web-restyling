version: '3.9'
services:
  dsn-web:
    build:
      context: .
      args:
        NEXT_PUBLIC_GLOBAL_API_BASE_URL_PRODUCTION: ${NEXT_PUBLIC_GLOBAL_API_BASE_URL_PRODUCTION}
        NEXT_PUBLIC_EMAILTOSEND: ${NEXT_PUBLIC_EMAILTOSEND}
    container_name: dsn-web
    ports:
      - "80:80"
    networks:
      - dsn-web
networks:
  dsn-web:
    driver: bridge
