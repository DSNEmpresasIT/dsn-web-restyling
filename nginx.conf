worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;
    gzip on;

    server {
        listen 80;
        server_name _;

        # Redirect bare /dashboard-ecommerce to canonical trailing-slash URL
        location = /dashboard-ecommerce {
            return 301 /dashboard-ecommerce/;
        }

        # Angular SPA — static files, takes priority via ^~
        location ^~ /dashboard-ecommerce/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /dashboard-ecommerce/index.html;
        }

        # Next.js — reverse proxy for everything else
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
